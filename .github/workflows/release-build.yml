name: Build on Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [linux-x64, win-x64, osx-x64]
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore PTreeGold.csproj

      - name: Publish binary
        run: >
          dotnet publish PTreeGold.csproj
          --configuration Release
          --runtime ${{ matrix.runtime }}
          --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          --output publish/${{ matrix.runtime }}

      - name: Archive publish output (Windows)
        if: startsWith(matrix.runtime, 'win-')
        run: |
          cd publish
          zip -r ../ptg-${{ github.ref_name }}-${{ matrix.runtime }}.zip ${{ matrix.runtime }}

      - name: Archive publish output (Unix)
        if: ${{ !startsWith(matrix.runtime, 'win-') }}
        run: |
          cd publish
          tar -czf ../ptg-${{ github.ref_name }}-${{ matrix.runtime }}.tar.gz ${{ matrix.runtime }}

      - name: Upload packaged binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ptg-${{ matrix.runtime }}
          path: |
            ptg-${{ github.ref_name }}-${{ matrix.runtime }}.zip
            ptg-${{ github.ref_name }}-${{ matrix.runtime }}.tar.gz
          if-no-files-found: ignore

  build-installer:
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download win-x64 artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: ptg-win-x64
          path: dist

      - name: Extract win-x64 archive
        shell: pwsh
        run: Expand-Archive dist/ptg-${{ github.ref_name }}-win-x64.zip -DestinationPath dist/extracted

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          iscc "/DAppVersion=$version" "/DSourceDir=$(Resolve-Path dist\extracted\win-x64)" installer\ptg-setup.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ptg-win-x64-setup
          path: installer/Output/ptg-*-win-x64-setup.exe

  build-msix:
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      WINDOWS_STORE_IDENTITY_NAME: ${{ vars.WINDOWS_STORE_IDENTITY_NAME }}
      WINDOWS_STORE_PUBLISHER: ${{ vars.WINDOWS_STORE_PUBLISHER }}
      MSIX_CERTIFICATE_BASE64: ${{ secrets.MSIX_CERTIFICATE_BASE64 }}
      MSIX_CERTIFICATE_PASSWORD: ${{ secrets.MSIX_CERTIFICATE_PASSWORD }}
      MSIX_ENABLED: ${{ vars.WINDOWS_STORE_IDENTITY_NAME != '' && vars.WINDOWS_STORE_PUBLISHER != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download win-x64 artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: ptg-win-x64
          path: dist

      - name: Extract win-x64 archive
        shell: pwsh
        run: Expand-Archive dist/ptg-${{ github.ref_name }}-win-x64.zip -DestinationPath dist/extracted

      - name: Restore MSIX signing certificate
        if: env.MSIX_ENABLED == 'true'
        shell: pwsh
        run: |
          if ($env:MSIX_CERTIFICATE_BASE64) {
            $certificatePath = Join-Path $env:RUNNER_TEMP 'ptg-store-signing.pfx'
            [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:MSIX_CERTIFICATE_BASE64))
          }
          else {
            Write-Host 'No MSIX signing certificate configured; continuing with an unsigned package.'
          }

      - name: Build MSIX package
        if: env.MSIX_ENABLED == 'true'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $certificatePath = Join-Path $env:RUNNER_TEMP 'ptg-store-signing.pfx'
          $scriptArgs = @{
            SourceDir = (Resolve-Path 'dist\extracted\win-x64')
            Version = $version
            IdentityName = $env:WINDOWS_STORE_IDENTITY_NAME
            Publisher = $env:WINDOWS_STORE_PUBLISHER
          }

          if (Test-Path $certificatePath) {
            $scriptArgs.CertificatePath = $certificatePath
            if ($env:MSIX_CERTIFICATE_PASSWORD) {
              $scriptArgs.CertificatePassword = $env:MSIX_CERTIFICATE_PASSWORD
            }
          }

          ./installer/create-msix.ps1 @scriptArgs

      - name: Skip MSIX package
        if: env.MSIX_ENABLED != 'true'
        shell: pwsh
        run: |
          Write-Host 'Skipping MSIX packaging because WINDOWS_STORE_IDENTITY_NAME and WINDOWS_STORE_PUBLISHER are not configured.'

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ptg-win-x64-msix
          path: installer/Output/ptg-*-win-x64.msix
          if-no-files-found: ignore

  publish-release:
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    needs: [build, build-installer, build-msix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          pattern: ptg-*
          path: dist
          merge-multiple: true

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          draft: false
          generate_release_notes: true
          files: dist/*

  publish-winget:
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
    needs: publish-release
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Submit to WinGet
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        with:
          identifier: ToddWhitehead.PTreeGold
          installers-regex: 'win-x64-setup\.exe$'
          release-tag: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          token: ${{ secrets.WINGET_TOKEN }}
